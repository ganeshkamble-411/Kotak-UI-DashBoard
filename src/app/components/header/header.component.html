<header class="kotak-header">
  <div class="header-left">
    <div class="logo-container">
      <span class="brand-name">kotak</span>
      <span class="brand-subtext">Kotak Mahindra Bank</span>
    </div>

    <div class="search-container">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="Search for something" class="search-input">
    </div>
  </div>

  <div class="header-right">
    <button class="skip-btn">
      <span>Skip to main content</span>
    </button>
    
    <div class="utility-links">
      <span class="utility-item">🌐 Language</span>
      <span class="utility-item">⭐ Favourites</span>
      <span class="utility-item">❓ Help</span>
    </div>
    
    <div class="profile-section" (click)="toggleDropdown($event)">
      <div class="profile-avatar">GK</div>
      <span class="profile-status">Verify it's you</span>

      <div class="profile-dropdown-card" *ngIf="isDropdownOpen" (click)="$event.stopPropagation()">
        <div class="dropdown-notch-arrow"></div>

        <div class="dropdown-user-identity">
          <div class="dropdown-avatar-circle">GK</div>
          <div class="user-meta-specs">
            <h4 class="user-full-name">GANESH KAMBLE</h4>
            <p class="user-crn-number">CRN 839853068</p>
            <a href="#" class="profile-action-link">View and edit Profile</a>
          </div>
        </div>

        <hr class="dropdown-divider" />

        <div class="dropdown-row-action">
          <span class="action-label-text">Share feedback</span>
          <span class="arrow-indicator-red">❯</span>
        </div>

        <hr class="dropdown-divider" />

        <div class="dropdown-row-action logout-action-row">
          <span class="logout-icon-vector">📤</span>
          <span class="logout-label-text">Log out</span>
        </div>
      </div>

    </div>
  </div>
</header>
