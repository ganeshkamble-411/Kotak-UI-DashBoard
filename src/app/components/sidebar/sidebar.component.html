<aside class="sidebar-container">
  <div class="sidebar-top">
    <nav class="nav-group">
      <a *ngFor="let item of mainNav" href="#" 
         [ngClass]="{'active': item.active}"
         class="nav-link">
        
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" [attr.d]="item.iconPath"></path>
        </svg>
        
        <span class="nav-text">{{ item.name }}</span>

        <span *ngIf="item.hasInfo" class="info-badge">ⓘ</span>

        <span *ngIf="item.badge" class="new-tag">{{ item.badge }}</span>
      </a>
    </nav>

    <div class="section-title">Services</div>
    
    <nav class="nav-group">
      <a *ngFor="let item of servicesNav" href="#" class="nav-link">
        
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" [attr.d]="item.iconPath"></path>
        </svg>
        
        <span class="nav-text">{{ item.name }}</span>
        
        <span *ngIf="item.hasInfo" class="info-badge">ⓘ</span>
      </a>
    </nav>
  </div>

  <div class="sidebar-bottom">
    <button class="logout-btn">
      <svg class="logout-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
      </svg>
      Log out
    </button>
  </div>
</aside>
