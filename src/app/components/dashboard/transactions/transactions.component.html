<div class="transactions-card">
  <div class="transactions-header">
    <h3 class="card-title">Your Recent Transactions</h3>
    <span class="account-badge">Savings 3949202641</span>
  </div>

  <div class="transactions-list">
    <div *ngFor="let tx of transactions" class="transaction-row">
      
      <div class="tx-left-block">
        <div [ngClass]="tx.type === 'debit' ? 'icon-debit' : 'icon-credit'" class="tx-type-icon">
          {{ tx.type === 'debit' ? '↘️' : '↗️' }}
        </div>

        <div class="tx-details">
          <p class="tx-description">{{ tx.description }}</p>
          <p class="tx-date">{{ tx.date }}</p>
        </div>
      </div>

      <div class="tx-right-block">
        <span [ngClass]="tx.type === 'debit' ? 'amt-debit' : 'amt-credit'" class="tx-amount">
          {{ tx.type === 'debit' ? '-' : '+' }} ₹{{ tx.amount | number:'1.2-2' }}
        </span>
        <button class="action-menu-btn">⋮</button>
      </div>

    </div>
  </div>
</div>
