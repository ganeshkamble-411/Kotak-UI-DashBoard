<div class="summary-card">
  <div class="summary-header">
    <h2 class="summary-title">Your Summary</h2>
    <button class="download-btn" title="Download Summary">📥</button>
  </div>

  <div class="summary-rows">
    <div class="summary-row-item assets-row">
      <div class="row-left">
        <span class="status-icon asset-icon">↗️</span>
        <span class="row-label">Assets</span>
      </div>
      <button class="view-balance-btn">👁️ View balance</button>
    </div>

    <div class="summary-row-item liabilities-row">
      <div class="row-left">
        <span class="status-icon liability-icon">↘️</span>
        <span class="row-label">Liabilities</span>
      </div>
      <button class="view-balance-btn">👁️ View balance</button>
    </div>
  </div>
  
  <p class="summary-footer-text">
    Explore popular offers on payment through 
    <span class="highlight-link">Credit Card, Debit Card, Net banking & other modes</span>
  </p>
</div>
